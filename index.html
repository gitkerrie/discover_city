<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="在中国地图上探索 12 座美食城市，收藏想去的地方，发现每座城市的招牌味道。">
  <meta name="theme-color" content="#171713">
  <title>寻味中国 - 中国美食探索地图</title>

  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="./" aria-label="返回寻味中国地图首页">
        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-bowl-food"></i></span>
        <span class="brand-copy">
          <strong>寻味中国</strong>
          <small>12 座城市，一张好吃的地图</small>
        </span>
      </a>

      <div class="search" id="searchContainer">
        <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
        <label class="sr-only" for="searchInput">搜索城市或招牌美食</label>
        <input id="searchInput" type="search" autocomplete="off" placeholder="搜索城市或招牌美食" aria-controls="searchResults" aria-expanded="false">
        <button class="icon-btn search-clear" id="searchClear" type="button" aria-label="清空搜索" title="清空搜索">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
        <div class="search-results" id="searchResults" role="listbox" aria-label="搜索结果"></div>
      </div>

      <button class="favorites-trigger" id="favoritesBtn" type="button" aria-label="打开我的想吃清单">
        <i class="fa-solid fa-heart" aria-hidden="true"></i>
        <span class="favorites-label">想吃清单</span>
        <span class="favorites-count" aria-label="收藏数量">0</span>
      </button>
    </header>

    <main class="map-stage">
      <div id="map" class="map" aria-label="中国美食城市地图"></div>

      <section class="map-intro" aria-labelledby="mapIntroTitle">
        <span class="eyebrow">中国美食探索地图</span>
        <h1 id="mapIntroTitle">顺着味道，认识一座城</h1>
        <p>点击地图上的城市，从一碗面、一笼点心或一锅热汤开始。</p>
        <div class="map-stats" aria-label="地图数据概览">
          <span><strong>12</strong> 座城市</span>
          <span><strong>48</strong> 道招牌味道</span>
        </div>
      </section>

      <nav class="city-index" aria-label="首发美食城市">
        <span class="city-index-title">城市索引</span>
        <div class="city-index-list" id="cityIndex"></div>
      </nav>

      <div class="map-key" aria-hidden="true">
        <span><i class="key-dot classic"></i>经典城市</span>
        <span><i class="key-dot hidden-gem"></i>宝藏城市</span>
      </div>
    </main>

    <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="关闭城市详情"></button>

    <aside class="city-drawer" id="cityDrawer" role="dialog" aria-modal="false" aria-labelledby="cityName" aria-hidden="true">
      <button class="icon-btn drawer-close" id="drawerClose" type="button" aria-label="关闭城市详情" title="关闭">
        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
      </button>

      <div class="drawer-scroll">
        <figure class="city-visual" id="cityVisual">
          <img id="cityImage" src="" alt="">
          <figcaption class="image-credit">
            图片许可见 <a href="assets/cities/SOURCES.md" target="_blank" rel="noopener">来源说明</a>
          </figcaption>
        </figure>

        <div class="city-content">
          <div class="city-heading">
            <span class="city-group" id="cityGroup"></span>
            <span class="city-province" id="cityProvince"></span>
            <h2 id="cityName"></h2>
            <p class="city-tagline" id="cityTagline"></p>
          </div>

          <div class="flavor-tags" id="flavorTags" aria-label="风味标签"></div>
          <p class="city-description" id="cityDescription"></p>

          <section class="dish-section" aria-labelledby="dishTitle">
            <div class="section-heading">
              <span>01</span>
              <h3 id="dishTitle">招牌味道</h3>
            </div>
            <ol class="dish-list" id="dishList"></ol>
          </section>

          <section class="food-tip" aria-labelledby="tipTitle">
            <div class="section-heading">
              <span>02</span>
              <h3 id="tipTitle">怎么吃更对味</h3>
            </div>
            <p id="cityTip"></p>
          </section>
        </div>
      </div>

      <div class="drawer-actions">
        <button class="command-btn favorite-action" id="favoriteBtn" type="button">
          <i class="fa-regular fa-heart" aria-hidden="true"></i>
          <span>加入想吃清单</span>
        </button>
        <button class="command-btn share-action" id="shareBtn" type="button">
          <i class="fa-solid fa-arrow-up-from-bracket" aria-hidden="true"></i>
          <span>分享城市</span>
        </button>
      </div>
    </aside>

    <div class="modal" id="favoritesModal" role="dialog" aria-modal="true" aria-labelledby="favoritesTitle" aria-hidden="true">
      <button class="modal-backdrop" id="favoritesBackdrop" type="button" aria-label="关闭想吃清单"></button>
      <section class="favorites-panel">
        <header class="favorites-header">
          <div>
            <span class="eyebrow">MY FOOD MAP</span>
            <h2 id="favoritesTitle">我的想吃清单</h2>
          </div>
          <button class="icon-btn" id="favoritesClose" type="button" aria-label="关闭想吃清单" title="关闭">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </header>
        <div class="favorites-list" id="favoritesList"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="loading" id="loading" role="status" aria-live="polite">
      <span class="loading-mark"><i class="fa-solid fa-bowl-food" aria-hidden="true"></i></span>
      <span>正在铺开美食地图</span>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
