<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态探索地图 - 发现冷门旅行目的地</title>
  
  <!-- Leaflet 地图库 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Leaflet MarkerCluster 聚合插件 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  
  <!-- 自定义样式 -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 字体图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- 主容器 -->
  <div class="app-container">
    
    <!-- 头部标题 -->
    <header class="app-header">
      <h1 class="app-title">
        <i class="fas fa-map-marked-alt"></i>
        探索地图
      </h1>
      <p class="app-subtitle">发现国内冷门特色旅行目的地</p>
    </header>

    <!-- 搜索框 -->
    <div class="search-container">
      <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索目的地...">
        <button class="search-clear" id="searchClear">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- 兴趣标签筛选 -->
    <div class="filter-tags">
      <button class="tag-btn active" data-category="all">
        <i class="fas fa-globe"></i>
        全部
      </button>
      <button class="tag-btn" data-category="food">
        <i class="fas fa-utensils"></i>
        美食
      </button>
      <button class="tag-btn" data-category="culture">
        <i class="fas fa-landmark"></i>
        文化
      </button>
      <button class="tag-btn" data-category="nature">
        <i class="fas fa-mountain"></i>
        自然
      </button>
    </div>

    <!-- 地图容器 -->
    <div id="map" class="map-container">
      <!-- 沉浸式背景层 -->
      <div class="immersive-background" id="immersiveBackground">
        <div class="background-image" id="backgroundImage"></div>
        <div class="background-overlay"></div>
      </div>
    </div>

    <!-- 收藏按钮 -->
    <button class="favorites-btn" id="favoritesBtn">
      <i class="fas fa-heart"></i>
      <span class="favorites-count">0</span>
    </button>

    <!-- 沉浸式灵感卡片 -->
    <div class="immersive-card-modal" id="cardModal">
      <div class="immersive-card" id="immersiveCard">
        <button class="card-close" id="cardClose">
          <i class="fas fa-times"></i>
        </button>
        
        <div class="card-image">
          <div class="image-carousel" id="imageCarousel">
            <div class="carousel-container">
              <div class="carousel-track" id="carouselTrack">
                <!-- 图片将动态插入这里 -->
              </div>
            </div>
            <button class="carousel-btn carousel-prev" id="carouselPrev">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="carousel-btn carousel-next" id="carouselNext">
              <i class="fas fa-chevron-right"></i>
            </button>
            <div class="carousel-indicators" id="carouselIndicators">
              <!-- 指示器将动态插入这里 -->
            </div>
          </div>
          <div class="card-category" id="cardCategory"></div>
        </div>
        
        <div class="card-content">
          <h3 class="card-title" id="cardTitle"></h3>
          <p class="card-description" id="cardDescription"></p>
          
          <div class="card-tags" id="cardTags">
            <!-- 动态生成标签 -->
          </div>
          
          <div class="card-actions">
            <button class="favorite-btn" id="favoriteBtn">
              <i class="far fa-heart"></i>
              <span>收藏</span>
            </button>
            <button class="share-btn">
              <i class="fas fa-share-alt"></i>
              分享
            </button>
            <button class="explore-btn">
              <i class="fas fa-compass"></i>
              探索更多
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 收藏清单弹窗 -->
    <div class="favorites-modal" id="favoritesModal">
      <div class="favorites-content">
        <div class="favorites-header">
          <h3>
            <i class="fas fa-heart"></i>
            我的想去清单
          </h3>
          <button class="favorites-close" id="favoritesClose">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <div class="favorites-list" id="favoritesList">
          <div class="empty-favorites">
            <i class="far fa-heart"></i>
            <p>还没有收藏任何目的地</p>
            <p>快去地图上探索吧！</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 主加载动画 -->
    <div class="loading" id="loading">
      <div class="loading-content">
        <div class="loading-logo">
          <i class="fas fa-map-marked-alt"></i>
        </div>
        <div class="loading-spinner-container">
          <div class="loading-spinner"></div>
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <p class="loading-text" id="loadingText">正在加载地图...</p>
        <div class="loading-progress">
          <div class="loading-progress-bar" id="loadingProgressBar"></div>
        </div>
      </div>
    </div>

    <!-- 图片加载指示器 -->
    <div class="image-loading-overlay" id="imageLoadingOverlay">
      <div class="image-loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
    </div>

    <!-- 错误提示 -->
    <div class="error-toast" id="errorToast">
      <div class="error-content">
        <i class="fas fa-exclamation-triangle"></i>
        <span class="error-message" id="errorMessage">网络连接异常，请稍后重试</span>
        <button class="error-close" id="errorClose">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

  </div>

  <!-- JavaScript 文件 -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
